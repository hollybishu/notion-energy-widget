<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #f0136e;
      --pink-soft: #fce8f1;
      --text: #1a1a1a;
      --text-muted: #888;
      --text-subtle: #bbb;
      --border: rgba(26, 22, 18, 0.1);
      --bg: #ffffff;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    html, body {
      width: 100%;
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body { padding: 1.25rem 1.5rem; }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 0.75rem;
    }

    .modes {
      display: flex;
      gap: 8px;
      margin-bottom: 1.1rem;
      flex-wrap: wrap;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .mode-btn:hover {
      border-color: var(--pink);
      color: var(--pink);
      background: var(--pink-soft);
    }

    .mode-btn.active {
      background: var(--pink);
      border-color: var(--pink);
      color: white;
      font-weight: 500;
    }

    .steps-list { list-style: none; margin-top: 0.25rem; }

    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      opacity: 0;
      transform: translateY(4px);
      animation: fadeUp 0.2s ease forwards;
    }

    .step-item:last-child { border-bottom: none; }

    .step-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--pink);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .step-item.done .step-dot { background: var(--text-subtle); }

    .step-text {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.4;
      color: var(--text);
      user-select: none;
      transition: all 0.2s ease;
    }

    .step-item.done .step-text {
      text-decoration: line-through;
      text-decoration-color: var(--text-subtle);
      color: var(--text-muted);
    }

    .step-item.done { opacity: 0.45; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .placeholder {
      font-size: 13px;
      color: var(--text-subtle);
      font-style: italic;
      padding: 0.5rem 0;
    }

    .smaller-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      color: var(--text-subtle);
      font-family: var(--sans);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      margin-top: 0.85rem;
      transition: color 0.15s ease;
    }
    .smaller-btn:hover { color: var(--pink); }
    .smaller-btn svg { width: 11px; height: 11px; flex-shrink: 0; }

    .show-all-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-subtle);
      font-family: var(--sans);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      margin-top: 0.85rem;
      transition: color 0.15s;
    }
    .show-all-btn:hover { color: var(--pink); }
    .show-all-btn.visible { display: block; }
  </style>
</head>
<body>

  <div class="eyebrow">energy level</div>

  <div class="modes" role="group" aria-label="Select energy level">
    <button class="mode-btn" data-mode="low">low</button>
    <button class="mode-btn" data-mode="medium">medium</button>
    <button class="mode-btn" data-mode="high">high</button>
  </div>

  <div id="steps-area">
    <div class="placeholder">choose a level to begin</div>
  </div>

  <script>
    const modes = {
      low: [
        "rest & watch something",
        "listen to a podcast",
        "eat a snack",
        "text someone you love",
        "scroll intentionally (not doom)"
      ],
      medium: [
        "feed yourself a simple meal",
        "reset one surface",
        "respond to one message",
        "care for your body",
        "do one small errand"
      ],
      high: [
        "deep work block",
        "content or consulting work",
        "reset a full space",
        "batch cook or meal prep",
        "handle life admin"
      ]
    };

    let currentMode = null;
    let isSmall = false;

    const area = document.getElementById('steps-area');
    const modeBtns = document.querySelectorAll('.mode-btn');

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        currentMode = mode;
        isSmall = false;
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSteps(modes[mode]);
      });
    });

    function renderSteps(list) {
      area.innerHTML = '';

      const ul = document.createElement('ul');
      ul.className = 'steps-list';

      list.forEach((text, i) => {
        const li = document.createElement('li');
        li.className = 'step-item';
        li.style.animationDelay = `${i * 40}ms`;

        const dot = document.createElement('div');
        dot.className = 'step-dot';

        const span = document.createElement('span');
        span.className = 'step-text';
        span.textContent = text;

        li.addEventListener('click', () => li.classList.toggle('done'));

        li.appendChild(dot);
        li.appendChild(span);
        ul.appendChild(li);
      });

      area.appendChild(ul);

      if (!isSmall) {
        const btn = document.createElement('button');
        btn.className = 'smaller-btn';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg> make it smaller';
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          isSmall = true;
          renderSteps(modes[currentMode].slice(0, 2));
        });
        area.appendChild(btn);
      } else {
        const reset = document.createElement('button');
        reset.className = 'show-all-btn visible';
        reset.textContent = '↩ show all';
        reset.addEventListener('click', (e) => {
          e.stopPropagation();
          isSmall = false;
          renderSteps(modes[currentMode]);
        });
        area.appendChild(reset);
      }
    }
  </script>
</body>
</html>
